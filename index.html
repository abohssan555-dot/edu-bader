function svgDonutGauge(pct, interimPct, strategicPct){
  var size=150, r=58, c=size/2;
  var circumference=2*Math.PI*r;
  var pctClamped=Math.max(0, Math.min(100, pct));
  var offset=circumference*(1-pctClamped/100);
  function pt(p){
    var a=((Math.max(0,Math.min(100,p))/100)*360-90)*Math.PI/180;
    return {x:c+r*Math.cos(a), y:c+r*Math.sin(a)};
  }
  var ip=pt(interimPct), sp=pt(strategicPct);
  return '<svg viewBox="0 0 '+size+' '+size+'" width="150" height="150">'+
    '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="#E1E4DE" stroke-width="14"/>'+
    '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="#145C4B" stroke-width="14" stroke-linecap="round" '+
      'stroke-dasharray="'+circumference+'" stroke-dashoffset="'+offset+'" transform="rotate(-90 '+c+' '+c+')"/>'+
    '<circle cx="'+ip.x+'" cy="'+ip.y+'" r="5" fill="#2E5C8A" stroke="#fff" stroke-width="1.5"/>'+
    '<circle cx="'+sp.x+'" cy="'+sp.y+'" r="5" fill="#B3423A" stroke="#fff" stroke-width="1.5"/>'+
    '<text x="'+c+'" y="'+(c+8)+'" text-anchor="middle" font-size="26" font-weight="800" fill="#0D3E33" font-family="Tajawal,Arial">'+pctClamped.toFixed(1)+'%</text>'+
  '</svg>';
}

function svgBarChart(rows, colors){
  var width=380, barH=24, gap=12, chartW=230;
  var height=rows.length*(barH+gap);
  var bars=rows.map(function(r,i){
    var y=i*(barH+gap);
    var w=Math.max(2,(r.pct/100)*chartW);
    var color=colors[i%colors.length];
    return '<g>'+
      '<text x="'+(width-4)+'" y="'+(y+barH/2+4)+'" text-anchor="end" font-size="12" font-family="Cairo,Arial" fill="#182620">'+esc(r.label)+'</text>'+
      '<rect x="'+(width-70-chartW)+'" y="'+y+'" width="'+chartW+'" height="'+barH+'" rx="6" fill="#EEF1EC"/>'+
      '<rect x="'+(width-70-chartW)+'" y="'+y+'" width="'+w+'" height="'+barH+'" rx="6" fill="'+color+'"/>'+
      '<text x="'+(width-70-chartW-8)+'" y="'+(y+barH/2+4)+'" text-anchor="end" font-size="11.5" font-weight="700" font-family="Cairo,Arial" fill="#182620">'+r.pct.toFixed(1)+'%</text>'+
    '</g>';
  }).join('');
  return '<svg viewBox="0 0 '+width+' '+height+'" width="100%" style="max-width:420px;display:block" height="'+height+'">'+bars+'</svg>';
}

function computeExcellenceReportModule(){
  var k=computeExcellenceKpi();
  var s=APP.kpiSettings||KPI_DEFAULTS;
  var promising=computePromisingSchools();
  var insights=[];
  if(k.total===0){
    insights.push('لا توجد بيانات أداء مدرسي مُدخلة بعد لحساب هذا المؤشر.');
  }else{
    insights.push('نسبة المدارس المتميزة حالياً '+k.pct.toFixed(1)+'%، مقابل مستهدف مرحلي '+(s.interim_pct!=null?s.interim_pct:KPI_DEFAULTS.interim_pct)+'% ومستهدف وزاري استراتيجي '+(s.strategic_pct!=null?s.strategic_pct:KPI_DEFAULTS.strategic_pct)+'% بحلول '+(s.strategic_date||KPI_DEFAULTS.strategic_date)+'.');
    if(k.byGender['بنين'].excellent===0 && k.byGender['بنات'].excellent>0){
      insights.push('تتركز جميع المدارس المتميزة حالياً ('+k.byGender['بنات'].excellent+' مدرسة) في مدارس البنات، بينما لا توجد أي مدرسة بنين ضمن هذه الفئة رغم وجود '+k.byGender['بنين'].total+' مدرسة بنين ضمن المدارس المقيَّمة.');
    }
    var stages=['ابتدائي','متوسط','ثانوي'];
    var stagePcts=stages.map(function(st){ var o=k.byStage[st]; return {stage:st, pct:o.total?(o.excellent/o.total*100):0, total:o.total}; }).filter(function(x){return x.total>0;});
    if(stagePcts.length){
      stagePcts.sort(function(a,b){return b.pct-a.pct;});
      insights.push('أعلى نسبة تميز حسب المرحلة في '+stagePcts[0].stage+' ('+stagePcts[0].pct.toFixed(1)+'%)'+(stagePcts.length>1?('، وأقلها في '+stagePcts[stagePcts.length-1].stage+' ('+stagePcts[stagePcts.length-1].pct.toFixed(1)+'%).'):'.'));
    }
    if(promising.length){
      insights.push('توجد '+promising.length+' مدرسة "واعدة بالتميز" (85%–89%) يمكن أن ترفع النسبة العامة إذا حظيت بدعم مركّز.');
    }
  }
  return {
    key:'excellence_ratio',
    title:'نسبة المدارس المتميزة',
    bigStat:{label:'النسبة الحالية', value:k.pct.toFixed(1)+'%'},
    subStat:k.excellent+' من أصل '+k.total+' مدرسة مقيَّمة',
    targetInfo:s,
    comparisonGroups:[
      {title:'حسب النوع', rows:[
        {label:'بنين', total:k.byGender['بنين'].total, count:k.byGender['بنين'].excellent, pct:k.byGender['بنين'].total?(k.byGender['بنين'].excellent/k.byGender['بنين'].total*100):0},
        {label:'بنات', total:k.byGender['بنات'].total, count:k.byGender['بنات'].excellent, pct:k.byGender['بنات'].total?(k.byGender['بنات'].excellent/k.byGender['بنات'].total*100):0}
      ]},
      {title:'حسب المرحلة', rows:['ابتدائي','متوسط','ثانوي'].map(function(st){
        var o=k.byStage[st]; return {label:st, total:o.total, count:o.excellent, pct:o.total?(o.excellent/o.total*100):0};
      })}
    ],
    insights:insights,
    extraTable: promising.length ? {
      title:'مدارس واعدة بالتميز (85%–89%)',
      headers:['المدرسة','المرحلة','النوع','نسبة الأداء العام الحالي','نسبة نواتج التعلم'],
      rows: promising.map(function(p){ return [p.schoolName, p.stage||'', p.gender||'', p.currentPerformancePct?p.currentPerformancePct+'%':'', p.learningOutcomesPct?p.learningOutcomesPct+'%':'']; })
    } : null

  var ankNoneBtn=document.getElementById('ankSelectNone');

function exportAnalyticalExcel(){
  if(!APP.analyticalReport) return;
  var wb=XLSX.utils.book_new();
  APP.analyticalReport.modules.forEach(function(mod){
    var rows=[];
    if(reportElements.bigStat){
      rows.push({'البيان':mod.bigStat.label, 'القيمة':mod.bigStat.value});
      rows.push({'البيان':'التفاصيل', 'القيمة':mod.subStat});
    }
    if(reportElements.targets && mod.targetInfo){
      rows.push({'البيان':'المستهدف المرحلي', 'القيمة':(mod.targetInfo.interim_pct||'')+'% '+(mod.targetInfo.interim_date||'')});
      rows.push({'البيان':'المستهدف الوزاري', 'القيمة':(mod.targetInfo.strategic_pct||'')+'% '+(mod.targetInfo.strategic_date||'')});
    }
    mod.comparisonGroups.forEach(function(g, gi){
      var show=(gi===0 && reportElements.genderChart) || (gi===1 && reportElements.stageChart);
      if(!show) return;
      rows.push({'البيان':'— '+g.title, 'القيمة':''});
      g.rows.forEach(function(r){ rows.push({'البيان':r.label, 'القيمة':r.pct.toFixed(1)+'% ('+r.count+'/'+r.total+')'}); });
    });
    if(reportElements.insights){
      mod.insights.forEach(function(ins,i){ rows.push({'البيان':'استنتاج '+(i+1), 'القيمة':ins}); });
    }
    if(rows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), mod.title.slice(0,28));
    if(reportElements.extraTable && mod.extraTable){
      var exRows=mod.extraTable.rows.map(function(row){
        var o={}; mod.extraTable.headers.forEach(function(h,i){ o[h]=row[i]; }); return o;
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exRows), (mod.title+'-تفاصيل').slice(0,28));
    }
  });
  XLSX.writeFile(wb, 'تقرير-تحليلي-بدر.xlsx');
  toast('تم تصدير الملف');
}

function generateReport(){
  var db=APP.db;
  var cats=[];
  var total=0;
  ALL_MODULES.forEach(function(m){
    if(!reportSelection[m.id]) return;
    var recs = m.id==='schools' ? db.schools.slice() : db.records.filter(function(r){return r.category===m.id;});
    if(!reportIncludeArchived) recs=recs.filter(function(r){return !r.archived;});
    var headers=m.fields.filter(function(f){return f.type!=='textarea';}).map(function(f){return f.label;});
    var rows=recs.map(function(r){
      return m.fields.filter(function(f){return f.type!=='textarea';}).map(function(f){
        var v=r[f.key];
        if(f.type==='school'){ var s=db.schools.find(function(x){return x.id===v;}); return s?s.name:''; }
        if(f.type==='date' && v) return fmtDate(v);
        return v||'';
      });
    });
    total+=recs.length;
    cats.push({id:m.id, label:m.label, headers:headers, rows:rows});
  });
  APP.report={generatedAt:new Date().toISOString(), total:total, categories:cats};
  toast('تم إنشاء التقرير');
}

async function loadAssignableCache(){

    APP.assignableCache = res.error ? [] : (res.data||[]);
  }catch(e){ APP.assignableCache = []; }

async function loadUsersCache(){
  try{
    var res = await sb.from('profiles').select('*').order('created_at',{ascending:false});
    if(res.error) throw res.error;
    APP.usersCache = res.data;
  }catch(err){
    APP.usersCache = [];
    toast('تعذر تحميل المستخدمين: '+(err&&err.message?err.message:''), true);
  }
  render();
}

  html+='<div class="table-wrap"><table class="data"><thead><tr><th class="num-col">م</th><th>الاسم</th><th>البريد الإلكتروني</th><th>الصلاحية</th><th>الحالة</th><th>تاريخ الإنشاء</th><th>إجراءات</th></tr></thead><tbody>';
  if(!users.length){
    html+='<tr class="empty-row"><td colspan="7">لا يوجد مستخدمون بعد.</td></tr>';
  }
  users.forEach(function(u, uIdx){
    html+='<tr><td class="num-col">'+(uIdx+1)+'</td><td>'+esc(u.name)+'</td><td>'+esc(u.username)+'</td>';
    html+='<td><select data-role="'+u.id+'" '+(u.id===APP.currentUser.id?'disabled':'')+'>'+
      ['admin','editor','viewer','provider','team_member','admin_supervisor','team_leader'].map(function(r){return '<option value="'+r+'" '+(r===u.role?'selected':'')+'>'+roleLabel(r)+'</option>';}).join('')+
      '</select></td>';
    html+='<td><span class="badge status-'+u.status+'">'+({pending:'قيد المراجعة',approved:'معتمد',rejected:'مرفوض'}[u.status])+'</span></td>';
    html+='<td>'+fmtDate(u.created_at)+'</td>';
    html+='<td class="flexrow">';
    if(u.status==='pending'){
      html+='<button class="btn btn-sm btn-primary" data-approve="'+u.id+'">موافقة</button>';
      html+='<button class="btn btn-sm btn-danger" data-reject="'+u.id+'">رفض</button>';
    }
    if(u.status==='approved' && u.id!==APP.currentUser.id){
      html+='<button class="btn btn-sm" data-disable="'+u.id+'">تعطيل</button>';
    }
    if(u.status==='rejected'){
      html+='<button class="btn btn-sm btn-primary" data-approve="'+u.id+'">موافقة</button>';
    }
    html+='</td></tr>';
  });
  html+='</tbody></table></div>';
  html+='<div class="muted small" style="margin-top:10px">ملاحظة: حذف حساب مستخدم نهائياً من نظام الدخول يتطلب إجراءً من داخل لوحة Supabase مباشرة (Authentication → Users) لأسباب أمنية.</div>';
  html+='</div>';
  return html;
}
function bindUsersEvents(){
  document.querySelectorAll('[data-role]').forEach(function(sel){
    sel.onchange=async function(){
      try{
        var res=await sb.from('profiles').update({role:sel.value}).eq('id', sel.dataset.role);
        if(res.error) throw res.error;
        toast('تم تحديث الصلاحية'); APP.usersCache=null; render();
      }catch(err){ toast('تعذر تحديث الصلاحية: '+(err&&err.message?err.message:''), true); }
    };
  });
  document.querySelectorAll('[data-approve]').forEach(function(b){
    b.onclick=async function(){
      try{
        var res=await sb.from('profiles').update({status:'approved'}).eq('id', b.dataset.approve);
        if(res.error) throw res.error;
        toast('تمت الموافقة على الحساب'); APP.usersCache=null; render();
      }catch(err){ toast('تعذر تنفيذ العملية: '+(err&&err.message?err.message:''), true); }
    };
  });
  document.querySelectorAll('[data-reject]').forEach(function(b){
    b.onclick=async function(){
      try{
        var res=await sb.from('profiles').update({status:'rejected'}).eq('id', b.dataset.reject);
        if(res.error) throw res.error;
        toast('تم رفض الحساب'); APP.usersCache=null; render();
      }catch(err){ toast('تعذر تنفيذ العملية: '+(err&&err.message?err.message:''), true); }
    };
  });
  document.querySelectorAll('[data-disable]').forEach(function(b){
    b.onclick=async function(){
      try{
        var res=await sb.from('profiles').update({status:'rejected'}).eq('id', b.dataset.disable);
        if(res.error) throw res.error;
        toast('تم تعطيل الحساب'); APP.usersCache=null; render();
      }catch(err){ toast('تعذر تنفيذ العملية: '+(err&&err.message?err.message:''), true); }
    };
  });
}

/* ================= INIT ================= */
async function init(){
  try{
    var sessRes = await sb.auth.getSession();
    var session = sessRes.data && sessRes.data.session;
    if(session){
      var prof = await fetchProfile(session.user.id);
      if(prof && prof.status==='approved'){
        APP.currentUser = profileToUser(prof);
        await fetchAll();
      }else{
        try{ await sb.auth.signOut(); }catch(e){}
      }
    }
    render();
  }catch(err){
    document.getElementById('root').innerHTML =
      '<div style="max-width:520px;margin:60px auto;font-family:Tahoma,Arial;background:#fff;'+
      'border:1px solid #eee;border-radius:12px;padding:24px;direction:rtl;text-align:right;box-shadow:0 6px 20px rgba(0,0,0,.08)">'+
      '<h2 style="margin-top:0">تعذر تشغيل التطبيق</h2>'+
      '<p style="color:#555;font-size:13.5px">حدث خطأ غير متوقع أثناء الاتصال بقاعدة البيانات. جرّب إعادة تحميل الصفحة.</p>'+
      '<pre style="background:#f7f7f7;padding:10px;border-radius:8px;font-size:11px;overflow:auto;color:#b3423a">'+esc(String(err && err.message || err))+'</pre>'+
      '</div>';
  }
}
init();

})();

</script>
