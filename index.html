<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منظومة متابعة التعليم — محافظة بدر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#F3F5F1;
  --surface:#FFFFFF;
  --ink:#182620;
  --muted:#5C6B62;
  --primary:#145C4B;
  --primary-dark:#0D3E33;
  --primary-soft:#E3EEE9;
  --accent:#C9A227;
  --accent-soft:#F6EDCB;
  --danger:#B3423A;
  --danger-soft:#F7E4E1;
  --info:#2E5C8A;
  --info-soft:#E4ECF4;
  --ok:#2F7A4D;
  --ok-soft:#E4F1E7;
  --orange:#C1690E;
  --orange-soft:#FBE9D6;
  --perf-excellent:#D9F0DE;
  --perf-excellent-ink:#1D7A3C;
  --perf-advanced:#D6E7FA;
  --perf-advanced-ink:#1C5FA8;
  --perf-developing:#FCE1B3;
  --perf-developing-ink:#9A5A0A;
  --perf-initial:#F9D3CE;
  --perf-initial-ink:#B32E24;
  --border:#E1E4DE;
  --radius:12px;
  --shadow:0 1px 2px rgba(24,38,32,.06), 0 6px 20px rgba(24,38,32,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Cairo','IBM Plex Sans Arabic', Tahoma, Arial, sans-serif;
  font-size:14.5px;
  line-height:1.6;
}
h1,h2,h3,h4,.brand h1,.nav-label,.stat-num{font-family:'Tajawal','Cairo', Tahoma, Arial, sans-serif}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--primary)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cfd6cf;border-radius:8px}

/* ---------- layout ---------- */
#app{display:flex;min-height:100vh}
#sidebar{
  width:268px;flex:none;background:linear-gradient(180deg,var(--primary-dark),var(--primary) 70%);
  color:#EAF3EF;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;
}
#sidebar .brand{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,.12)}
#sidebar .brand .eyebrow{font-size:11px;letter-spacing:.5px;color:var(--accent);font-weight:700;text-transform:none}
#sidebar .brand h1{font-size:18px;margin:4px 0 2px;font-weight:800;color:#fff}
#sidebar .brand .sub{font-size:12px;color:#BFD8CD}
nav.navlist{padding:10px 10px 20px;flex:1}
.nav-link{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:#DDEFE7;
  text-decoration:none;font-size:13.6px;margin:2px 0;border:1px solid transparent;
}
.nav-link .dot{width:7px;height:7px;border-radius:50%;background:#7FBFA9;flex:none}
.nav-link:hover{background:rgba(255,255,255,.08)}
.nav-link.active{background:#fff;color:var(--primary-dark);font-weight:700}
.nav-link.active .dot{background:var(--accent)}
details.navgroup{margin:4px 0}
details.navgroup>summary{
  list-style:none;cursor:pointer;padding:9px 12px;border-radius:9px;font-size:13px;font-weight:700;
  color:#BFD8CD;display:flex;align-items:center;justify-content:space-between;
}
details.navgroup>summary::-webkit-details-marker{display:none}
details.navgroup>summary:after{content:'‹';transform:rotate(-90deg);display:inline-block;transition:.15s}
details.navgroup[open]>summary:after{transform:rotate(0deg)}
.navsection-title{padding:16px 14px 4px;font-size:11px;color:var(--accent);font-weight:800;letter-spacing:.4px}
.navgroup .nav-link{margin-inline-start:10px;font-size:13px}
#sidebar .userbox{padding:14px 18px;border-top:1px solid rgba(255,255,255,.12);font-size:12.5px}
#sidebar .userbox .name{font-weight:700;color:#fff}
#sidebar .userbox .role{color:#BFD8CD;font-size:11.5px}
#sidebar .logout{margin-top:8px;width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:7px;border-radius:8px;font-size:12.5px}
#sidebar .logout:hover{background:rgba(255,255,255,.18)}

#main{flex:1;min-width:0;display:flex;flex-direction:column}
#topbar{
  background:var(--surface);border-bottom:1px solid var(--border);padding:14px 26px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;
}
#topbar h2{margin:0;font-size:19px;font-weight:800}
#topbar .crumb{font-size:12px;color:var(--muted);margin-top:2px}
#content{padding:22px 26px 60px;flex:1}
#menuToggle{display:none}

/* ---------- cards / stats ---------- */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border-inline-start:5px solid var(--primary)}
.stat-card.accent{border-inline-start-color:var(--accent)}
.stat-card.info{border-inline-start-color:var(--info)}
.stat-card.danger{border-inline-start-color:var(--danger)}
.stat-card .label{font-size:12px;color:var(--muted);margin-bottom:6px}
.stat-num{font-size:28px;font-weight:800;color:var(--primary-dark)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:20px}
.panel h3{margin:0 0 14px;font-size:15.5px;font-weight:800;display:flex;align-items:center;gap:8px}
.panel h3 .sq{width:9px;height:9px;background:var(--accent);display:inline-block;border-radius:2px}

.bar-row{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:12.8px}
.bar-row .bl{width:110px;flex:none;color:var(--muted)}
.bar-track{flex:1;background:var(--bg);border-radius:6px;height:12px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent))}
.bar-row .bn{width:34px;text-align:left;flex:none;font-weight:700}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);color:var(--ink);padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;transition:.12s}
.btn:hover{border-color:var(--primary)}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#402e05}
.btn-danger{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--primary)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center}
.toolbar-filters{margin-bottom:10px}
.toolbar-actions{margin-bottom:14px;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding-bottom:2px}
.search-box-sm{min-width:110px;max-width:150px;padding:6px 10px;font-size:12.5px}
.btn .ic{display:inline-block;font-size:12px;transform:translateY(-1px)}
.btn-icon-action{height:30px;padding:0 11px;display:inline-flex;align-items:center;gap:5px;border-radius:8px;background:var(--ok);color:#fff;border:none;font-size:11.8px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 2px 6px rgba(47,122,77,.28);transition:.12s}
.btn-icon-action .ic{font-size:13px;line-height:1}
.btn-icon-action:hover{background:#256B41;transform:translateY(-1px);box-shadow:0 4px 10px rgba(47,122,77,.38)}
.stats-compact-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:14px}
.stat-chip{font-size:12px;padding:4px 10px;background:var(--bg);border-radius:7px;border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.stat-chip b{color:var(--ink);font-weight:800}
.stat-chip-main{background:var(--primary-soft);color:var(--primary-dark);border-color:var(--primary-soft)}
.stat-chip-main b{color:var(--primary-dark)}
.stat-sep{width:1px;height:18px;background:var(--border);margin:0 2px}

.kpi-bignum{font-size:44px;font-weight:800;color:var(--primary-dark);font-family:'Tajawal',sans-serif;line-height:1}
.kpi-sub{font-size:12.5px;color:var(--muted);margin:4px 0 18px}
.kpi-bar-wrap{position:relative;padding-top:26px;margin-bottom:10px}
.kpi-bar-track{position:relative;height:22px;background:var(--bg);border:1px solid var(--border);border-radius:11px;overflow:visible}
.kpi-bar-fill{height:100%;border-radius:11px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .4s}
.kpi-marker{position:absolute;top:-24px;transform:translateX(50%);text-align:center;font-size:11px;font-weight:700;white-space:nowrap}
.kpi-marker:after{content:'';position:absolute;top:22px;right:50%;width:2px;height:26px;background:currentColor;opacity:.55}
.kpi-marker.interim{color:var(--info)}
.kpi-marker.strategic{color:var(--danger)}
.kpi-target-form{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.kpi-target-form .field{margin-bottom:0;min-width:130px}
.kpi-compare-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:10px}
.kpi-compare-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--primary-dark)}
.report-mode-tabs{display:flex;gap:12px;flex-wrap:wrap}
.report-mode-tab{flex:1;min-width:220px;text-align:right;padding:16px 18px;border-radius:12px;border:2px solid var(--border);background:var(--surface);font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;color:var(--ink);cursor:pointer;transition:.15s}
.report-mode-tab:hover{border-color:var(--primary)}
.report-mode-tab.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary-dark)}

.honor-board{background:linear-gradient(160deg,#0D3E33,#145C4B 60%,#1B6B4F);border:none;position:relative;overflow:hidden}
.honor-board:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 90% 10%, rgba(201,162,39,.35), transparent 45%)}
.honor-title{color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;position:relative;margin-bottom:10px}
.honor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;position:relative;max-height:290px;overflow-y:auto;padding-inline-end:4px}
.honor-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:14px 16px;backdrop-filter:blur(2px)}
.honor-rank{color:var(--accent);font-weight:800;font-size:13px;font-family:'Tajawal',sans-serif}
.honor-name{color:#fff;font-weight:700;font-size:14px;margin:6px 0 3px;line-height:1.4}
.honor-meta{color:#BFD8CD;font-size:11.5px;margin-bottom:10px}
.honor-pcts{display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:#EAF3EF}
.honor-pcts b{color:var(--accent)}

.overview-hero{background:linear-gradient(120deg,#0D3E33,#145C4B 55%,#1B6B4F 85%,#C9A227);border-radius:14px;padding:20px 28px;margin-bottom:14px;position:relative;overflow:hidden}
.overview-hero:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 85% 20%, rgba(255,255,255,.15), transparent 50%)}
.oh-eyebrow{color:var(--accent);font-weight:700;font-size:12px;letter-spacing:.5px;position:relative}
.oh-title{color:#fff;font-family:'Tajawal',sans-serif;font-size:21px;font-weight:800;margin-top:4px;position:relative}
.oh-sub{color:#D8EAE2;font-size:12px;margin-top:4px;position:relative}

.hero-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.hero-stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;text-align:center;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.hero-stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.07)}
.hs-icon{font-size:20px;margin-bottom:4px}
.hs-num{font-family:'Tajawal',sans-serif;font-size:21px;font-weight:800;color:var(--primary-dark)}
.hs-label{font-size:11px;color:var(--muted);margin-top:2px}
.hero-stat-card.hs-blue .hs-num{color:var(--info)}
.hero-stat-card.hs-green .hs-num{color:var(--ok)}
.hero-stat-card.hs-gold .hs-num{color:#8a6d0c}

.report-banner{background:linear-gradient(135deg,var(--primary-dark),var(--primary) 75%);color:#fff;padding:26px 30px;border-radius:14px;margin-bottom:22px;position:relative;overflow:hidden}
.report-banner:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 85% 15%, rgba(201,162,39,.28), transparent 45%)}
.rb-eyebrow{color:var(--accent);font-weight:700;font-size:12px;letter-spacing:.5px;position:relative}
.rb-title{font-size:23px;font-weight:800;margin-top:6px;font-family:'Tajawal',sans-serif;position:relative}
.rb-sub{font-size:12.5px;color:#BFD8CD;margin-top:4px;position:relative}
.report-block-colored{border-radius:12px;padding:20px 22px;background:#FBFCFA}
.rb-mod-title{font-family:'Tajawal',sans-serif;font-size:17px;font-weight:800;color:var(--primary-dark);margin:0 0 14px;padding-bottom:10px;border-bottom:2px solid var(--accent);display:inline-block}
.rb-border-info{border-inline-start:4px solid var(--info)}
.rb-border-accent{border-inline-start:4px solid var(--accent)}
.rb-insights{background:var(--primary-soft);border-radius:10px;padding:14px 16px;margin-top:14px;font-size:13px}
.sticky-hscroll{position:fixed;bottom:0;height:14px;overflow-x:auto;overflow-y:hidden;z-index:45;background:var(--bg);border-top:1px solid var(--border)}
.sticky-hscroll::-webkit-scrollbar{height:12px}
#stickyHScrollInner{height:1px}

/* أزرار وقوائم منسدلة صغيرة (⋮ لكل صف، وقائمة التصدير) */
.dd-caret{font-size:10px;margin-inline-start:2px}
.btn-icon{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:7px;background:var(--surface);border:1px solid var(--border);font-size:15px;line-height:1;color:var(--muted)}
.btn-icon:hover{border-color:var(--primary);color:var(--primary)}
.dd-menu{background:#fff;border:1px solid var(--border);border-radius:9px;box-shadow:0 10px 30px rgba(20,40,30,.18);z-index:200;display:flex;flex-direction:column;min-width:150px;overflow:hidden;padding:4px}
.dd-menu button{display:block;width:100%;text-align:right;background:none;border:none;padding:8px 10px;font-size:12.8px;border-radius:6px;color:var(--ink);cursor:pointer}
.dd-menu button:hover{background:var(--primary-soft);color:var(--primary-dark)}
.dd-menu button.dd-danger{color:var(--danger)}
.dd-menu button.dd-danger:hover{background:var(--danger-soft)}

/* لوحة الروابط */
.links-panel{padding:16px 18px;margin-bottom:16px}
.links-panel-head{display:flex;align-items:center;gap:8px;font-size:13.5px;margin-bottom:10px;color:var(--primary-dark)}
.links-icon{font-size:16px}
.pill-link{font-size:12.2px;padding:6px 13px;border-radius:20px;background:var(--info-soft);color:var(--info);text-decoration:none;display:inline-flex;gap:7px;align-items:center;border:1px solid transparent;font-weight:600;transition:.12s}
.pill-link:hover{border-color:var(--info);background:#fff;box-shadow:var(--shadow)}
.pl-dot{width:6px;height:6px;border-radius:50%;background:var(--info);flex:none}
.toolbar .grow{flex:1}
.search-box{padding:8px 12px;border:1px solid var(--border);border-radius:9px;min-width:200px;background:var(--surface)}

/* ---------- table ---------- */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius)}
table.data{width:100%;border-collapse:collapse;background:var(--surface);font-size:13px;min-width:640px}
table.data th{background:var(--primary-soft);color:var(--primary-dark);font-weight:700;text-align:right;padding:10px 12px;white-space:nowrap;border-bottom:1px solid var(--border)}
table.data td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;max-width:260px}
table.data tr:last-child td{border-bottom:none}
table.data tr:hover td{background:#FAFBF9}
.empty-row td{text-align:center;color:var(--muted);padding:34px}
.num-col{width:38px;text-align:center;color:var(--muted);font-weight:700;font-size:11.5px}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
.badge .d{width:6px;height:6px;border-radius:50%}
.badge.st-new{background:var(--info-soft);color:var(--info)} .badge.st-new .d{background:var(--info)}
.badge.st-progress{background:var(--accent-soft);color:#8a6d0c} .badge.st-progress .d{background:var(--accent)}
.badge.st-done{background:var(--ok-soft);color:var(--ok)} .badge.st-done .d{background:var(--ok)}
.badge.st-closed{background:#ECEDEA;color:var(--muted)} .badge.st-closed .d{background:var(--muted)}
.badge.st-active{background:var(--ok-soft);color:var(--ok)} .badge.st-active .d{background:var(--ok)}
.badge.st-inactive{background:#ECEDEA;color:var(--muted)} .badge.st-inactive .d{background:var(--muted)}
.badge.role-admin{background:var(--accent-soft);color:#8a6d0c}
.badge.role-editor{background:var(--info-soft);color:var(--info)}
.badge.role-viewer{background:#ECEDEA;color:var(--muted)}
.badge.role-provider{background:var(--orange-soft);color:var(--orange)}
.badge.role-team_member{background:var(--primary-soft);color:var(--primary-dark)}
.badge.role-admin_supervisor{background:#F1E4FF;color:#6B3FA0}
.badge.role-team_leader{background:#FFE4E1;color:#B33F5E}
.badge.status-pending{background:var(--accent-soft);color:#8a6d0c}
.badge.status-approved{background:var(--ok-soft);color:var(--ok)}
.badge.status-rejected{background:var(--danger-soft);color:var(--danger)}
.badge.perf-excellent{background:var(--perf-excellent);color:var(--perf-excellent-ink)} .badge.perf-excellent .d{background:var(--perf-excellent-ink)}
.badge.perf-advanced{background:var(--perf-advanced);color:var(--perf-advanced-ink)} .badge.perf-advanced .d{background:var(--perf-advanced-ink)}
.badge.perf-developing{background:var(--perf-developing);color:var(--perf-developing-ink)} .badge.perf-developing .d{background:var(--perf-developing-ink)}
.badge.perf-initial{background:var(--perf-initial);color:var(--perf-initial-ink)} .badge.perf-initial .d{background:var(--perf-initial-ink)}
.badge.perf-none{background:#ECEDEA;color:var(--muted)} .badge.perf-none .d{background:var(--muted)}

.perf-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid transparent;background:#fff;color:var(--muted)}
.perf-pill .d{width:7px;height:7px;border-radius:50%;display:inline-block}
.perf-pill.pf-excellent .d{background:var(--ok)} .perf-pill.pf-excellent.active{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}
.perf-pill.pf-advanced .d{background:var(--info)} .perf-pill.pf-advanced.active{border-color:var(--info);background:var(--info-soft);color:var(--info)}
.perf-pill.pf-developing .d{background:var(--orange)} .perf-pill.pf-developing.active{border-color:var(--orange);background:var(--orange-soft);color:var(--orange)}
.perf-pill.pf-initial .d{background:var(--danger)} .perf-pill.pf-initial.active{border-color:var(--danger);background:var(--danger-soft);color:var(--danger)}
.perf-pill.pf-none .d{background:var(--muted)} .perf-pill.pf-none.active{border-color:var(--muted);background:#ECEDEA;color:var(--muted)}
.perf-pill.pf-all.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary-dark)}

table.data.table-compact th, table.data.table-compact td{padding:3px 9px;font-size:12.2px;max-width:170px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
table.data.table-compact tbody tr:nth-child(odd){background:#F4F7F3}
table.data.table-compact tbody tr:nth-child(even){background:#ECF1EA}
table.data.table-compact tbody tr:hover td{background:#E4EDE3}

.linkbar{display:flex;flex-wrap:wrap;gap:8px}

/* ---------- forms / modal ---------- */
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px;color:var(--muted)}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--ink);
}
.field textarea{min-height:70px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--primary);outline-offset:1px;border-color:var(--primary)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.field-row{grid-template-columns:1fr}}

.modal-overlay{position:fixed;inset:0;background:rgba(15,25,20,.55);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:34px 14px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:560px;padding:22px 24px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-box h3{margin:0 0 4px;font-size:17px;font-weight:800}
.modal-box .modal-sub{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;border-top:1px solid var(--border);padding-top:14px}
.modal-close{position:absolute}

/* ---------- login ---------- */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:
  radial-gradient(circle at 12% 10%, rgba(201,162,39,.18), transparent 40%),
  radial-gradient(circle at 90% 85%, rgba(20,92,75,.25), transparent 45%), var(--primary-dark);
  padding:24px}
.login-wrap{width:100%;max-width:430px}
.login-brand{text-align:center;margin-bottom:18px;color:#EAF3EF}
.login-brand .eyebrow{color:var(--accent);font-weight:700;font-size:12px;letter-spacing:.5px}
.login-brand h1{font-size:22px;margin:6px 0 4px;font-weight:800;color:#fff}
.login-brand .sub{font-size:12.5px;color:#BFD8CD}
.brand-logo{height:56px;width:auto;margin-bottom:10px;object-fit:contain}
#sidebar .brand .brand-logo{height:40px;margin-bottom:8px}
.login-card{background:#fff;border-radius:16px;padding:22px 22px 26px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.authtabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:18px}
.authtabs button{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:8px;font-weight:700;font-size:12.8px;color:var(--muted)}
.authtabs button.active{background:var(--primary);color:#fff}
.auth-msg{font-size:12.8px;padding:10px 12px;border-radius:8px;margin-bottom:12px}
.auth-msg.err{background:var(--danger-soft);color:var(--danger)}
.auth-msg.ok{background:var(--ok-soft);color:var(--ok)}
.auth-msg.info{background:var(--info-soft);color:var(--info)}
.hint-box{margin-top:14px;font-size:11.5px;color:#BFD8CD;text-align:center;line-height:1.8}

/* ---------- toast ---------- */
#toastRoot{position:fixed;bottom:20px;left:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--primary-dark);color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:toastin .18s ease}
.toast.err{background:var(--danger)}
@keyframes toastin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.mobilebar{display:none}
@media(max-width:900px){
  #sidebar{position:fixed;right:0;top:0;z-index:60;transform:translateX(100%);transition:.2s;box-shadow:0 0 40px rgba(0,0,0,.3)}
  #sidebar.open{transform:translateX(0)}
  .mobilebar{display:flex;align-items:center;gap:10px;background:var(--primary-dark);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:50}
  .mobilebar button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 10px;border-radius:8px}
  #main{width:100%}
}
.muted{color:var(--muted)}
.small{font-size:11.8px}
.right{margin-inline-start:auto}
.flexrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.divider{height:1px;background:var(--border);margin:14px 0}
.checkline{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
.checklist{max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:9px;padding:10px 14px;background:var(--bg)}
.report-block{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px;background:#fff}
.report-block h4{margin:0 0 8px;font-size:14px;font-weight:800;color:var(--primary-dark)}
#infographicRoot{position:fixed;left:-9999px;top:0;width:900px;background:linear-gradient(160deg,var(--primary-dark),var(--primary));padding:40px;color:#fff}

    expected_graduates_1448: data.expectedGraduates1448!==''&&data.expectedGraduates1448!=null? parseInt(data.expectedGraduates1448,10):null,
    principal:data.principal||null, supervisor:data.supervisor||null, location:data.location||null, notes:data.notes||null
  };
}
var RECORD_DIRECT_KEYS=['title','name','schoolId','date','status','priority','description','notes','link'];
function recordToRow(modId, data){
  var row={category:modId, extra:{}};
  Object.keys(data).forEach(function(k){
    if(RECORD_DIRECT_KEYS.indexOf(k)>=0){
      var col = k==='schoolId' ? 'school_id' : k;
      row[col] = data[k]!==''? data[k] : null;
    }else{
      row.extra[k]=data[k];
    }
  });
  return row;
}
function rowToRecord(row){
  var rec={
    id:row.id, category:row.category, title:row.title, name:row.name,
    schoolId: row.school_id, date: row.date, status: row.status, priority: row.priority,
    description: row.description, notes: row.notes, link: row.link,
    archived: row.archived, source: row.source, createdAt: row.created_at, updatedAt: row.updated_at, createdBy: row.created_by
  };
  var extra=row.extra||{};
  Object.keys(extra).forEach(function(k){ rec[k]=extra[k]; });
  return rec;
}
function profileToUser(p){ return {id:p.id, name:p.name, username:p.username, role:p.role, status:p.status, createdAt:p.created_at}; }

async function fetchAll(){
  var res = await Promise.all([
    sb.from('schools').select('*').order('created_at',{ascending:false}),
    sb.from('records').select('*').order('created_at',{ascending:false}),
    sb.from('form_links').select('*').order('created_at',{ascending:false})
  ]);
  var schoolsRes=res[0], recordsRes=res[1], linksRes=res[2];
  APP.db.schools = (schoolsRes.data||[]).map(rowToSchool);
  APP.db.records = (recordsRes.data||[]).map(rowToRecord);
  APP.db.formLinks = (linksRes.data||[]).map(function(l){ return {id:l.id, category:l.category, title:l.title, url:l.url, isSync:!!l.is_sync, lastSyncedAt:l.last_synced_at, createdAt:l.created_at}; });
}
async function fetchProfile(userId){
  var res = await sb.from('profiles').select('*').eq('id', userId).single();
  if(res.error) return null;
  return res.data;
}

/* ---- عمليات الإضافة / التعديل / الأرشفة / الحذف على قاعدة البيانات ---- */
async function dbInsertRecord(modId, data){
  if(modId==='schools'){
    var row=schoolToRow(data); row.created_by=APP.currentUser.id;
    var res=await sb.from('schools').insert(row).select().single();
    if(res.error) throw res.error;
    return rowToSchool(res.data);
  }
  var row2=recordToRow(modId, data); row2.created_by=APP.currentUser.id; row2.source=data.source||'يدوي';
  var res2=await sb.from('records').insert(row2).select().single();
  if(res2.error) throw res2.error;
  return rowToRecord(res2.data);
}
async function dbUpdateRecord(modId, id, data){
  if(modId==='schools'){
    var row=schoolToRow(data); row.updated_at=new Date().toISOString();
    var res=await sb.from('schools').update(row).eq('id',id).select().single();
    if(res.error) throw res.error;
    return rowToSchool(res.data);
  }
  var row2=recordToRow(modId, data); row2.updated_at=new Date().toISOString();
  var res2=await sb.from('records').update(row2).eq('id',id).select().single();
  if(res2.error) throw res2.error;
  return rowToRecord(res2.data);
}
async function dbSetArchived(modId, id, val){
  var table = modId==='schools' ? 'schools' : 'records';
  var res = await sb.from(table).update({archived:val, updated_at:new Date().toISOString()}).eq('id', id);
  if(res.error) throw res.error;
}
async function dbDelete(modId, id){
  var table = modId==='schools' ? 'schools' : 'records';
  var res = await sb.from(table).delete().eq('id', id);
  if(res.error) throw res.error;
}
async function dbBulkDelete(modId, ids){
  if(!ids || !ids.length) return;
  var table = modId==='schools' ? 'schools' : 'records';
  var chunkSize=200;
  for(var i=0;i<ids.length;i+=chunkSize){
    var chunk=ids.slice(i,i+chunkSize);
    var res=await sb.from(table).delete().in('id', chunk);
    if(res.error) throw res.error;
  }
}
async function dbBulkInsertRecords(modId, dataArray){
  if(!dataArray || !dataArray.length) return [];
  var table = modId==='schools' ? 'schools' : 'records';
  var rows = dataArray.map(function(d){
    if(modId==='schools'){
      var r=schoolToRow(d); r.created_by=APP.currentUser.id; return r;
    }
    var r2=recordToRow(modId, d); r2.created_by=APP.currentUser.id; r2.source=d.source||'يدوي'; return r2;
  });
  var results=[];
  var chunkSize=200;
  for(var i=0;i<rows.length;i+=chunkSize){
    var chunk=rows.slice(i,i+chunkSize);
    var res=await sb.from(table).insert(chunk).select();
    if(res.error) throw res.error;
    results=results.concat(res.data||[]);
  }
  return modId==='schools' ? results.map(rowToSchool) : results.map(rowToRecord);
}

/* ---------------- شريط تمرير أفقي ثابت أسفل الشاشة (لا يختفي عند النزول للأسفل) ---------------- */
function hideStickyScroll(){
  var bar=document.getElementById('stickyHScroll');
  if(bar) bar.style.display='none';
}
function updateStickyScrollbar(){
  var bar=document.getElementById('stickyHScroll');
  var inner=document.getElementById('stickyHScrollInner');
  if(!bar || !inner) return;
  var tw=document.querySelector('#content .table-wrap');
  if(!tw || tw.scrollWidth<=tw.clientWidth+2){ bar.style.display='none'; bar._syncedTable=null; return; }
  var rect=tw.getBoundingClientRect();
  bar.style.left=Math.round(rect.left)+'px';
  bar.style.width=Math.round(rect.width)+'px';
  inner.style.width=tw.scrollWidth+'px';
  bar.scrollLeft=tw.scrollLeft;
  bar.style.display='block';
  bar._syncedTable=tw;
  tw.onscroll=function(){ if(bar._syncedTable===tw) bar.scrollLeft=tw.scrollLeft; };
}
(function(){
  var barInitDone=false;
  function initStickyScrollOnce(){
    if(barInitDone) return; barInitDone=true;
    var bar=document.getElementById('stickyHScroll');
    if(!bar) return;
    bar.onscroll=function(){ if(bar._syncedTable) bar._syncedTable.scrollLeft=bar.scrollLeft; };
    window.addEventListener('resize', function(){ updateStickyScrollbar(); });
  }
  document.addEventListener('DOMContentLoaded', initStickyScrollOnce);
  if(document.readyState!=='loading') initStickyScrollOnce();
})();

function setBtnLoading(form, loading, label){
  var btn=form.querySelector('button[type="submit"]');
  if(!btn) return;
  if(loading){ btn.dataset.orig=btn.textContent; btn.textContent='جارٍ التنفيذ...'; btn.disabled=true; }
  else{ btn.textContent = label || btn.dataset.orig || btn.textContent; btn.disabled=false; }
}

function bindLoginEvents(){
  document.querySelectorAll('.authtabs button').forEach(function(b){
    b.onclick=function(){ APP.authTab=b.dataset.tab; APP.authMsg=null; render(); };
  });
  var lf=document.getElementById('loginForm');
  if(lf) lf.onsubmit=async function(e){
    e.preventDefault();
    setBtnLoading(lf, true);
    var fd=new FormData(lf);
    var email=fd.get('email').trim();
    var password=fd.get('password');
    var adminOnly=fd.get('adminOnly')==='1';
    try{
      var signRes = await sb.auth.signInWithPassword({email:email, password:password});
      if(signRes.error){
        APP.authMsg={type:'err', text:'البريد الإلكتروني أو كلمة المرور غير صحيحة'}; render(); return;
      }
      var prof = await fetchProfile(signRes.data.user.id);
      if(!prof){ await sb.auth.signOut(); APP.authMsg={type:'err', text:'تعذر العثور على بيانات الحساب'}; render(); return; }
      if(adminOnly && prof.role!=='admin'){
        await sb.auth.signOut();
        APP.authMsg={type:'err', text:'هذا الحساب لا يملك صلاحية المشرف'}; render(); return;
      }
      if(prof.status==='pending'){
        await sb.auth.signOut();
        APP.authMsg={type:'info', text:'حسابك قيد المراجعة بانتظار موافقة المشرف'}; render(); return;
      }
      if(prof.status==='rejected'){
        await sb.auth.signOut();
        APP.authMsg={type:'err', text:'تم رفض طلب هذا الحساب من قبل المشرف'}; render(); return;
      }
      APP.currentUser=profileToUser(prof);
      await fetchAll();
      APP.view={id:'overview'}; APP.authMsg=null;
      render();
    }catch(err){
      APP.authMsg={type:'err', text:'تعذر تسجيل الدخول: '+(err&&err.message?err.message:'خطأ غير متوقع')}; render();
    }
  };
  var rf=document.getElementById('registerForm');
  if(rf) rf.onsubmit=async function(e){
    e.preventDefault();
    setBtnLoading(rf, true);
    var fd=new FormData(rf);
    var name=fd.get('name').trim(), email=fd.get('email').trim();
    var p1=fd.get('password'), p2=fd.get('password2');
    if(p1!==p2){ APP.authMsg={type:'err', text:'كلمتا المرور غير متطابقتين'}; render(); return; }
    try{
      var res = await sb.auth.signUp({
        email:email, password:p1,
        options:{ data:{ name:name, username:email } }
      });
      if(res.error){
        APP.authMsg={type:'err', text:'تعذر إنشاء الحساب: '+res.error.message}; render(); return;
      }
      try{ await sb.auth.signOut(); }catch(e2){}
      APP.authTab='login';
      APP.authMsg={type:'ok', text:'تم إرسال طلبك بنجاح، سيتم إشعارك بعد موافقة المشرف.'};
      render();
    }catch(err){
      APP.authMsg={type:'err', text:'تعذر إنشاء الحساب: '+(err&&err.message?err.message:'خطأ غير متوقع')}; render();
    }
  };
}

function renderHonorBoard(){

  if(!excellent.length) return '';
  excellent = excellent.slice().sort(function(a,b){
    var av=parseFloat(a.currentPerformancePct)||0, bv=parseFloat(b.currentPerformancePct)||0;
    if(bv!==av) return bv-av;
    return (parseFloat(b.learningOutcomesPct)||0)-(parseFloat(a.learningOutcomesPct)||0);
  });
  var html='<div class="panel honor-board">';
  html+='<h3 class="honor-title">🏆 لوحة الشرف — مدارس فئة التميز (90% فأعلى)</h3>';
  html+='<div class="honor-grid">';

    var s=db.schools.find(function(x){return x.id===r.schoolId;});
    html+='<div class="honor-card"><div class="honor-rank">#'+(i+1)+'</div>'+
      '<div class="honor-name">'+esc(s?s.name:'—')+'</div>'+
      '<div class="honor-meta">'+esc(r.stage||'')+' · '+esc(r.gender||'')+'</div>'+
      '<div class="honor-pcts"><span>الأداء العام: <b>'+esc(r.currentPerformancePct||'—')+(r.currentPerformancePct?'%':'')+'</b></span>'+
      '<span>نواتج التعلم: <b>'+esc(r.learningOutcomesPct||'—')+(r.learningOutcomesPct?'%':'')+'</b></span></div>'+
    '</div>';
  });
  html+='</div></div>';
  return html;

function renderSchoolsStatsPanel(records){
  var total=records.length;
  var byStage={'رياض أطفال':0,'ابتدائي':0,'متوسط':0,'ثانوي':0,'متعدد المراحل':0};
  var byGender={'بنين':0,'بنات':0};
  var STAGE_RANK={'رياض أطفال':0,'ابتدائي':1,'متوسط':2,'ثانوي':3,'متعدد المراحل':2};

  /* الآلية: نجمّع المدارس حسب اسم المدير/ة. مدير على مدرسة واحدة فقط = "مستقلة".
     مدير على أكثر من مدرسة = كلها "مشتركة"، وتُحتسب الأعداد فقط لمدرسة واحدة (الأعلى مرحلة) لتفادي التكرار. */
  var byPrincipal={};
  records.forEach(function(r){
    var p=(r.principal||'').trim();
    if(p){ (byPrincipal[p]=byPrincipal[p]||[]).push(r); }
  });
  var distinctPrincipals=Object.keys(byPrincipal).length;
  var independentCount=0, sharedGroupsCount=0, sharedSchoolsCount=0, noPrincipalCount=0;
  var primaryIdForGroup={};
  Object.keys(byPrincipal).forEach(function(p){
    var group=byPrincipal[p];
    if(group.length===1){ independentCount++; }
    else{
      sharedGroupsCount++;
      sharedSchoolsCount+=group.length;
      var primary=group.slice().sort(function(a,b){ return (STAGE_RANK[b.stage]||0)-(STAGE_RANK[a.stage]||0); })[0];
      primaryIdForGroup[primary.id]=true;
    }
  });

  var totalStudents=0, totalTeachers=0, totalDeputies=0, totalCounselors=0, totalAdmins=0;
  records.forEach(function(r){
    if(byStage.hasOwnProperty(r.stage)) byStage[r.stage]++;
    if(byGender.hasOwnProperty(r.gender)) byGender[r.gender]++;
    var p=(r.principal||'').trim();
    if(!p) noPrincipalCount++;
    var group=p?byPrincipal[p]:null;
    var isDuplicateForCounting = group && group.length>1 && !primaryIdForGroup[r.id];
    /* الطلاب والمعلمون أعداد خاصة بكل مدرسة على حدة (تُحتسب دائماً)؛
       الوكيل/الموجه/الإداري وظائف مشتركة ضمن المجمّع (تُحتسب مرة واحدة فقط) */
    var st=parseFloat(r.studentsCount); if(!isNaN(st)) totalStudents+=st;
    var te=parseFloat(r.teachersCount); if(!isNaN(te)) totalTeachers+=te;
    if(!isDuplicateForCounting){
      var de=parseFloat(r.deputyCount); if(!isNaN(de)) totalDeputies+=de;
      var co=parseFloat(r.counselorCount); if(!isNaN(co)) totalCounselors+=co;
      var ad=parseFloat(r.adminAssistantCount); if(!isNaN(ad)) totalAdmins+=ad;
    }
  });
  var html='<div class="stats-compact-bar">';
  html+='<span class="stat-chip stat-chip-main">🏫 إجمالي المدارس: <b>'+total+'</b></span>';
  html+='<span class="stat-chip">رياض أطفال: <b>'+byStage['رياض أطفال']+'</b></span>';
  html+='<span class="stat-chip">ابتدائي: <b>'+byStage['ابتدائي']+'</b></span>';
  html+='<span class="stat-chip">متوسط: <b>'+byStage['متوسط']+'</b></span>';
  html+='<span class="stat-chip">ثانوي: <b>'+byStage['ثانوي']+'</b></span>';
  html+='<span class="stat-chip">بنين: <b>'+byGender['بنين']+'</b></span>';
  html+='<span class="stat-chip">بنات: <b>'+byGender['بنات']+'</b></span>';
  html+='</div>';
  html+='<div class="stats-compact-bar" style="margin-top:6px">';
  html+='<span class="stat-chip">👤 عدد المدراء/المديرات: <b>'+distinctPrincipals+'</b></span>';
  html+='<span class="stat-chip">مستقلة الإدارة: <b>'+independentCount+'</b></span>';
  html+='<span class="stat-chip">مشتركة الإدارة: <b>'+sharedSchoolsCount+'</b> ('+sharedGroupsCount+' مجمّع)</span>';
  if(noPrincipalCount) html+='<span class="stat-chip">بلا اسم مدير مُدخل: <b>'+noPrincipalCount+'</b></span>';
  html+='<span class="stat-sep"></span>';
  html+='<span class="stat-chip">إجمالي الطلاب (المُدخل): <b>'+totalStudents+'</b></span>';
  html+='<span class="stat-chip">إجمالي المعلمين (المُدخل): <b>'+totalTeachers+'</b></span>';
  html+='<span class="stat-chip">إجمالي الوكلاء/الوكيلات: <b>'+totalDeputies+'</b></span>';
  html+='<span class="stat-chip">إجمالي الموجهين/الموجهات: <b>'+totalCounselors+'</b></span>';
  html+='<span class="stat-chip">إجمالي المساعدين/المساعدات الإداريين: <b>'+totalAdmins+'</b></span>';
  html+='</div>';
  html+='<div class="small muted" style="margin-top:6px">* أعداد الطلاب والمعلمين تُحتسب كاملة لكل مدرسة على حدة. أما الوكيل/الموجه/المساعد الإداري فتُحتسب مرة واحدة فقط لكل مجمّع إداري مشترك (لأنها وظائف مشتركة بين عدة مدارس بمدير واحد)، لتفادي احتسابها أكثر من مرة.</div>';
  return html;
}

function isJunkSchoolName(name){
  if(!name) return true;
  var n=String(name).trim();
  if(!n) return true;
  if(/^\d+$/.test(n)) return true;
  var junkWords=['الابتدائية','المتوسطة','الثانوية','إجمالي','المجموع','العدد','الكلي','اجمالي'];
  return junkWords.indexOf(n)>=0;
}

async function scanAndCleanJunk(){
  var junkSchools = APP.db.schools.filter(function(s){ return isJunkSchoolName(s.name); });
  var junkPerf = APP.db.records.filter(function(r){ return r.category==='school_performance' && !r.schoolId && !r.statNumber; });
  var total = junkSchools.length + junkPerf.length;
  if(!total){ toast('لم يتم العثور على سجلات غير صالحة'); return; }
  var sampleNames = junkSchools.slice(0,5).map(function(s){return s.name;});
  if(!confirm('تم العثور على '+total+' سجل يبدو غير صالح (مثال: '+(sampleNames.join('، ')||'سجلات أداء بدون مدرسة مرتبطة')+'). هل تريد حذفها نهائياً؟')) return;
  var okCount=0;
  for(var i=0;i<junkPerf.length;i++){
    try{ await dbDelete('school_performance', junkPerf[i].id); okCount++; }catch(e){}
  }
  for(var j=0;j<junkSchools.length;j++){
    try{ await dbDelete('schools', junkSchools[j].id); okCount++; }catch(e){}
  }
  await fetchAll();
  toast('تم حذف '+okCount+' سجل غير صالح');
  render();
}

function renderModuleView(modId){
  var mod=getModule(modId);
  var db=APP.db;
  if(modId==='schools' && !APP.assignableCache){
    loadAssignableCache().then(render);
    return '<div class="panel">جارٍ التحميل...</div>';
  }
  var records=db.records.filter(function(r){return r.category===modId && !r.archived;});
  if(modId==='schools') records=db.schools.filter(function(r){return !r.archived;});
  var allRecords=records.slice();

  var q=(moduleSearch[modId]||'').trim().toLowerCase();
  if(q){
    records=records.filter(function(r){
      return mod.fields.some(function(f){
        var v=r[f.key];
        if(f.type==='school'){
          var s=db.schools.find(function(x){return x.id===v;});
          v = s ? s.name : '';
        }
        if(f.type==='provider'){
          var p=(APP.assignableCache||[]).find(function(x){return x.id===v;});
          v = p ? p.name : '';
        }
        return v!==undefined && v!==null && String(v).toLowerCase().indexOf(q)>=0;
      });
    });
  }

  var hasGenderField = mod.fields.some(function(f){return f.key==='gender';});
  var hasStageField = mod.fields.some(function(f){return f.key==='stage';});
  var hasPerfField = mod.fields.some(function(f){return f.key==='currentPerformance';});
  var filt = moduleFilters[modId] || {gender:'', stage:'', perf:''};
  moduleFilters[modId]=filt;
  if(hasGenderField && filt.gender) records=records.filter(function(r){return r.gender===filt.gender;});
  if(hasStageField && filt.stage) records=records.filter(function(r){return r.stage===filt.stage;});
  if(hasPerfField && filt.perf){
    if(filt.perf==='__none__') records=records.filter(function(r){return !r.currentPerformance || r.currentPerformance==='لا يوجد';});
    else records=records.filter(function(r){return r.currentPerformance===filt.perf;});
  }

  var isCompact = (modId==='schools' || modId==='school_performance');
  var sorted=records.slice();
  if(modId==='schools'){
    sorted.sort(function(a,b){return String(a.name||'').localeCompare(String(b.name||''),'ar');});
  }else if(modId==='school_performance'){
    sorted.sort(function(a,b){
      var an=(db.schools.find(function(s){return s.id===a.schoolId;})||{}).name||'';
      var bn=(db.schools.find(function(s){return s.id===b.schoolId;})||{}).name||'';
      return String(an).localeCompare(String(bn),'ar');
    });
  }else{
    sorted.sort(function(a,b){return new Date(b.createdAt||0)-new Date(a.createdAt||0);});
  }

  /* الصف الأول: أزرار الإجراءات كأيقونات خضراء متناسقة مع تسمية مختصرة */
  var html='<div class="toolbar toolbar-actions">';

    html+='<button class="btn-icon-action" id="btnAdd" title="إضافة سجل"><span class="ic">＋</span>إضافة</button>';
    html+='<button class="btn-icon-action" id="btnImport" title="استيراد إكسل"><span class="ic">⇪</span>استيراد</button>';
    html+='<input type="file" id="fileImport" accept=".xlsx,.xls,.csv" style="display:none">';
    html+='<button class="btn-icon-action" id="btnTemplate" title="تنزيل قالب"><span class="ic">⬇</span>قالب</button>';
    if(modId==='school_performance'){
      html+='<button class="btn-icon-action" id="btnOfficialImport" title="تحديث من الملف الرسمي (وزاري)"><span class="ic">⟳</span>تحديث</button>';
      html+='<input type="file" id="fileOfficialImport" accept=".xlsx,.xls" style="display:none">';
      if(isAdmin()) html+='<button class="btn-icon-action" id="btnCleanJunk" title="تنظيف سجلات غير صالحة"><span class="ic">🧹</span>تنظيف</button>';
    }
  }
  html+='<button type="button" class="btn-icon-action dd-trigger" data-ddtrigger="export" title="تصدير"><span class="ic">⇩</span>تصدير</button>';
  html+='<template id="ddtpl_export">'+
      '<button type="button" id="expXlsx">📊 إكسل (.xlsx)</button>'+
      '<button type="button" id="expPdf">📄 PDF</button>'+
      '<button type="button" id="expImg">🖼 صورة (PNG)</button>'+
    '</template>';
  html+='</div>';

  html+='<input class="search-box search-box-sm" id="modSearch" placeholder="🔍 بحث..." value="'+esc(moduleSearch[modId]||'')+'">';
  if(hasGenderField){
    html+='<select id="filterGender" class="search-box search-box-sm"><option value="">👥 كل الأنواع</option>'+
      '<option value="بنين" '+(filt.gender==='بنين'?'selected':'')+'>بنين</option>'+
      '<option value="بنات" '+(filt.gender==='بنات'?'selected':'')+'>بنات</option></select>';

      '</select>';
  }
  html+='</div>';

function getStore(modId){ return modId==='schools' ? APP.db.schools : APP.db.records; }

function findRecord(modId, id){
  return getStore(modId).find(function(r){return r.id===id;});
}
async function archiveRecord(modId, id, val){
  var r=findRecord(modId,id); if(!r) return;
  try{
    await dbSetArchived(modId, id, val);
    r.archived=val; r.updatedAt=new Date().toISOString();
    toast(val?'تمت أرشفة السجل':'تمت استعادة السجل'); render();
  }catch(err){ toast('تعذر تنفيذ العملية: '+(err&&err.message?err.message:''), true); }
}
async function deleteRecord(modId, id){
  try{
    await dbDelete(modId, id);
    var store=getStore(modId);
    var idx=store.findIndex(function(r){return r.id===id;});
    if(idx>=0) store.splice(idx,1);
    toast('تم حذف السجل'); render();
  }catch(err){ toast('تعذر الحذف: '+(err&&err.message?err.message:''), true); }
}

function fieldInputHtml(f, val){
  val = val===undefined||val===null? '' : val;
  if(f.type==='select'){
    var opts='<option value=""></option>'+f.options.map(function(o){return '<option value="'+esc(o)+'" '+(o===val?'selected':'')+'>'+esc(o)+'</option>';}).join('');
    return '<select name="'+f.key+'" '+(f.required?'required':'')+'>'+opts+'</select>';
  }
  if(f.type==='school'){
    var opts2='<option value="">بدون</option>'+APP.db.schools.map(function(s){return '<option value="'+s.id+'" '+(s.id===val?'selected':'')+'>'+esc(s.name)+'</option>';}).join('');
    return '<select name="'+f.key+'">'+opts2+'</select>';
  }
  if(f.type==='provider'){
    var provList=(APP.assignableCache||[]).filter(function(p){return !f.roleFilter || p.role===f.roleFilter;});
    var canAssign = isAdmin() || currentRole()==='team_leader';
    if(!canAssign){
      var cur=provList.find(function(p){return p.id===val;});
      return '<input type="text" value="'+esc(cur?cur.name:(val?'—':'بدون'))+'" disabled>'+
        '<input type="hidden" name="'+f.key+'" value="'+esc(val)+'">';
    }
    var opts3='<option value="">بدون</option>'+provList.map(function(p){return '<option value="'+p.id+'" '+(p.id===val?'selected':'')+'>'+esc(p.name)+'</option>';}).join('');
    return '<select name="'+f.key+'">'+opts3+'</select>';
  }
  if(f.type==='textarea'){
    return '<textarea name="'+f.key+'" '+(f.required?'required':'')+'>'+esc(val)+'</textarea>';
  }
  if(f.type==='date'){
    return '<input type="date" name="'+f.key+'" value="'+esc(val)+'" '+(f.required?'required':'')+'>';
  }
  if(f.type==='number'){
    return '<input type="number" name="'+f.key+'" value="'+esc(val)+'" '+(f.required?'required':'')+'>';
  }
  if(f.type==='url'){
    return '<input type="url" name="'+f.key+'" value="'+esc(val)+'" placeholder="https://">';
  }
  return '<input type="text" name="'+f.key+'" value="'+esc(val)+'" '+(f.required?'required':'')+'>';
}

async function openRecordModal(modId, recId){
  var mod=getModule(modId);
  if(mod.fields.some(function(f){return f.type==='provider';}) && !APP.assignableCache){
    await loadAssignableCache();
  }
  var rec = recId ? findRecord(modId, recId) : {};
  var html='<h3>'+(recId?'تعديل سجل':'إضافة سجل جديد')+'</h3><div class="modal-sub">'+esc(mod.label)+'</div>';
  html+='<form id="recForm">';
  mod.fields.forEach(function(f){
    html+='<div class="field"><label>'+esc(f.label)+(f.required?' *':'')+'</label>'+fieldInputHtml(f, rec[f.key])+'</div>';
  });
  html+='<div class="modal-actions"><button type="button" class="btn" id="modalCancel">إلغاء</button><button type="submit" class="btn btn-primary">حفظ</button></div>';
  html+='</form>';
  openModal(html);
  document.getElementById('modalCancel').onclick=closeModal;
  document.getElementById('recForm').onsubmit=async function(e){
    e.preventDefault();
    var form=e.target;
    var submitBtn=form.querySelector('button[type="submit"]');
    if(submitBtn){ submitBtn.disabled=true; submitBtn.textContent='جارٍ الحفظ...'; }
    var fd=new FormData(form);
    var data={};
    mod.fields.forEach(function(f){ data[f.key]=fd.get(f.key)||''; });
    try{
      if(recId){
        var updated = await dbUpdateRecord(modId, recId, data);
        Object.assign(rec, updated);
        toast('تم تحديث السجل');
      }else{
        var created = await dbInsertRecord(modId, data);
        getStore(modId).unshift(created);
        toast('تمت إضافة السجل');
      }
      closeModal(); render();
    }catch(err){
      toast('تعذر الحفظ: '+(err&&err.message?err.message:'خطأ غير متوقع'), true);
      if(submitBtn){ submitBtn.disabled=false; submitBtn.textContent='حفظ'; }
    }
  };
}

function openViewModal(modId, recId){
  var mod=getModule(modId);
  var rec=findRecord(modId, recId);
  if(!rec) return;
  var html='<h3>'+esc(recordDisplayTitle(rec,mod))+'</h3><div class="modal-sub">'+esc(mod.label)+'</div>';
  mod.fields.forEach(function(f){
    var v=rec[f.key];
    var display='—';
    if(f.type==='school'){ var s=APP.db.schools.find(function(x){return x.id===v;}); display=s?s.name:'—'; }
    else if(f.type==='provider'){ var p=(APP.assignableCache||[]).find(function(x){return x.id===v;}); display=p?p.name:'—'; }
    else if(f.type==='url' && v){ display='<a href="'+esc(v)+'" target="_blank" rel="noopener">'+esc(v)+'</a>'; }
    else if(f.type==='date' && v){ display=fmtDate(v); }
    else if(v){ display=esc(v); }
    html+='<div class="field"><label>'+esc(f.label)+'</label><div style="padding:8px 2px">'+display+'</div></div>';
  });
  html+='<div class="modal-actions"><button type="button" class="btn btn-primary" id="modalCancel">إغلاق</button></div>';
  openModal(html);
  document.getElementById('modalCancel').onclick=closeModal;
}

/* ---- Import / Export / Template ---- */
function downloadTemplate(modId){
  var mod=getModule(modId);
  var headers=mod.fields.map(function(f){return f.label;});
  var ws=XLSX.utils.aoa_to_sheet([headers]);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'قالب');
  XLSX.writeFile(wb, 'قالب-'+mod.label+'.xlsx');
}

function exportModuleExcel(modId){
  var mod=getModule(modId);
  var db=APP.db;
  var HIDDEN_IN_CORE_VIEW = ['adminDomainPct','teachingDomainPct','environmentDomainPct'];
  var exportFields = (modId==='school_performance' && coreDomainsOnly)
    ? mod.fields.filter(function(f){ return HIDDEN_IN_CORE_VIEW.indexOf(f.key)<0; })
    : mod.fields;
  var records = modId==='schools' ? db.schools : db.records.filter(function(r){return r.category===modId;});
  var rows=records.map(function(r){
    var o={};
    exportFields.forEach(function(f){
      var v=r[f.key];
      if(f.type==='school'){ var s=db.schools.find(function(x){return x.id===v;}); v=s?s.name:''; }
      if(f.type==='provider'){ var p=(APP.assignableCache||[]).find(function(x){return x.id===v;}); v=p?p.name:''; }
      o[f.label]=v||'';
    });
    o['الحالة (أرشفة)']=r.archived?'مؤرشف':'نشط';
    return o;
  });
  var ws=XLSX.utils.json_to_sheet(rows);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, mod.label.slice(0,28));
  XLSX.writeFile(wb, mod.label+(coreDomainsOnly&&modId==='school_performance'?'-مجالان أساسيان':'')+'.xlsx');
  toast('تم تصدير الملف');
}

function closeFloatingMenu(){
  var menu=document.getElementById('floatingMenu');
  if(menu){ menu.style.display='none'; menu.innerHTML=''; delete menu.dataset.openFor; }
}
function positionFloatingMenu(trigger, menu){
  var rect=trigger.getBoundingClientRect();
  menu.style.minWidth='155px';
  var left=rect.right-155;
  if(left<8) left=8;
  var top=rect.bottom+4;
  if(top+220>window.innerHeight){ top=rect.top-4; menu.style.transform='translateY(-100%)'; }
  else{ menu.style.transform='none'; }
  menu.style.top=top+'px';
  menu.style.left=left+'px';
}
function bindFloatingMenuActions(){
  var menu=document.getElementById('floatingMenu');
  if(!menu) return;
  var modId=APP.view.id;
  menu.querySelectorAll('[data-view]').forEach(function(b){ b.onclick=function(){ closeFloatingMenu(); openViewModal(modId, b.dataset.view); }; });
  menu.querySelectorAll('[data-edit]').forEach(function(b){ b.onclick=function(){ closeFloatingMenu(); openRecordModal(modId, b.dataset.edit); }; });
  menu.querySelectorAll('[data-archive]').forEach(function(b){ b.onclick=function(){ closeFloatingMenu(); archiveRecord(modId, b.dataset.archive, true); }; });
  menu.querySelectorAll('[data-del]').forEach(function(b){ b.onclick=function(){ closeFloatingMenu(); if(confirm('هل أنت متأكد من حذف هذا السجل نهائياً؟')) deleteRecord(modId, b.dataset.del); }; });
  var expXlsx=menu.querySelector('#expXlsx'); if(expXlsx) expXlsx.onclick=function(){ closeFloatingMenu(); exportModuleExcel(modId); };
  var expPdf=menu.querySelector('#expPdf'); if(expPdf) expPdf.onclick=function(){ closeFloatingMenu(); exportModuleTablePdf(modId); };
  var expImg=menu.querySelector('#expImg'); if(expImg) expImg.onclick=function(){ closeFloatingMenu(); exportModuleTableImage(modId); };
}
document.addEventListener('click', function(e){
  var trigger=e.target.closest('.dd-trigger');
  var menu=document.getElementById('floatingMenu');
  if(trigger){
    e.stopPropagation();
    var key=trigger.dataset.ddtrigger;
    if(menu.dataset.openFor===key && menu.style.display!=='none'){ closeFloatingMenu(); return; }
    var tpl=document.getElementById('ddtpl_'+key);
    if(!tpl) return;
    menu.innerHTML='';
    menu.appendChild(tpl.content.cloneNode(true));
    menu.dataset.openFor=key;
    menu.style.display='flex';
    positionFloatingMenu(trigger, menu);
    bindFloatingMenuActions();
    return;
  }
  if(menu && menu.style.display!=='none' && !menu.contains(e.target)) closeFloatingMenu();
});
window.addEventListener('scroll', closeFloatingMenu, true);
window.addEventListener('resize', closeFloatingMenu);

function exportModuleTablePdf(modId){
  var el=document.querySelector('#content .table-wrap');
  if(!el || !window.html2canvas || !window.jspdf){ toast('تعذر تجهيز أدوات التصدير', true); return; }
  toast('جارٍ تجهيز ملف PDF...');
  html2canvas(el, {scale:2, backgroundColor:'#ffffff'}).then(function(canvas){
    var pdf=new window.jspdf.jsPDF('l','mm','a4');
    var pageW=297, pageH=210;
    var imgW=pageW-14;
    var imgH=canvas.height*imgW/canvas.width;
    var heightLeft=imgH, position=7;
    var imgData=canvas.toDataURL('image/png');
    pdf.addImage(imgData,'PNG',7,position,imgW,imgH);
    heightLeft-=(pageH-14);
    while(heightLeft>0){
      position = heightLeft - imgH + 7;
      pdf.addPage();
      pdf.addImage(imgData,'PNG',7,position,imgW,imgH);
      heightLeft-=(pageH-14);
    }
    pdf.save(getModule(modId).label+'.pdf');
  }).catch(function(){ toast('تعذر إنشاء ملف PDF', true); });
}

function exportModuleTableImage(modId){
  var el=document.querySelector('#content .table-wrap');

  toast('جارٍ تجهيز الصورة...');
  html2canvas(el, {scale:2, backgroundColor:'#ffffff'}).then(function(canvas){
    canvas.toBlob(function(blob){ download(getModule(modId).label+'.png', blob); });
  }).catch(function(){ toast('تعذر إنشاء الصورة', true); });
}

function findRawValue(row, label){
  var val='';
  Object.keys(row).forEach(function(k){
    if(k.trim()===label.trim()) val=row[k];
  });
  return val;
}
function mapRowToRecord(mod, row){
  var rec={};
  mod.fields.forEach(function(f){
    var val=findRawValue(row, f.label);
    if(f.type==='school' && val){
      var s=APP.db.schools.find(function(x){return x.name===String(val).trim();});
      val = s? s.id : '';
    }
    rec[f.key]=val;
  });
  return rec;
}
async function resolveOrCreateSchool(name){
  name=String(name||'').trim();
  if(!name) return '';
  var existing=APP.db.schools.find(function(x){return x.name===name;});
  if(existing) return existing.id;
  try{
    var created=await dbInsertRecord('schools', {
      name:name, gender:'', stage:'', studentsCount:'', teachersCount:'',
      principal:'', supervisor:'', location:'', notes:'أُنشئت تلقائياً أثناء الاستيراد'
    });
    APP.db.schools.unshift(created);
    return created.id;
  }catch(e){ return ''; }
}
/* يكمل الحقول من نوع "مدرسة" التي لم تُطابَق، بإنشاء المدرسة تلقائياً إن كان اسمها مكتوباً في الملف */
async function fillMissingSchoolLinks(mod, rec, rawRow){
  for(var i=0;i<mod.fields.length;i++){
    var f=mod.fields[i];
    if(f.type==='school' && !rec[f.key]){
      var raw=findRawValue(rawRow, f.label);
      if(raw) rec[f.key]=await resolveOrCreateSchool(raw);
    }
  }
  return rec;
}

async function importModuleExcel(modId, file, importMode){
  var mod=getModule(modId);
  var reader=new FileReader();
  reader.onload=async function(e){
   try{
    var rows;
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data, {type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      rows=XLSX.utils.sheet_to_json(ws, {defval:''});
    }catch(err){
      toast('تعذرت قراءة الملف، تأكد من صيغة الإكسل', true); return;
    }
    if(!rows.length){ toast('الملف لا يحتوي على أي صفوف بيانات', true); return; }

    /* ---- وضع "تحديث المطابق بالاسم + إضافة الجديد" ---- */
    if(importMode==='merge'){
      var hasNameField = mod.fields.some(function(f){return f.key==='name';});
      var hasTitleField = mod.fields.some(function(f){return f.key==='title';});
      var schoolField = mod.fields.find(function(f){return f.type==='school';});
      var idField = hasNameField ? 'name' : (hasTitleField ? 'title' : (schoolField ? schoolField.key : null));
      toast('جارٍ المطابقة والتحديث...');
      var updated=0, addedM=0, skippedM=0, failedM=0, schoolsCreatedM=0;
      for(var mi=0; mi<rows.length; mi++){
        var rawRow=rows[mi];
        var recFull=mapRowToRecord(mod, rawRow);
        var beforeCountM=APP.db.schools.length;
        recFull=await fillMissingSchoolLinks(mod, recFull, rawRow);
        if(APP.db.schools.length>beforeCountM) schoolsCreatedM++;
        var idVal=idField ? String(recFull[idField]||'').trim() : '';
        if(!idVal){ skippedM++; continue; }
        var store=getStore(modId);
        var searchPool = modId==='schools' ? store : store.filter(function(r){ return r.category===modId; });
        var existing=searchPool.find(function(s){ return !s.archived && String(s[idField]||'').trim()===idVal; });
        var partial={};
        mod.fields.forEach(function(f){
          var v=recFull[f.key];
          if(v!==undefined && v!==''){ partial[f.key]=v; }
        });
        if(existing){
          try{
            var merged=Object.assign({}, existing, partial);
            var resU=await dbUpdateRecord(modId, existing.id, merged);
            Object.assign(existing, resU);
            updated++;
          }catch(errU){ failedM++; }
        }else{
          var reqOkM=mod.fields.filter(function(f){return f.required;}).every(function(f){return recFull[f.key];});
          if(!reqOkM){ skippedM++; continue; }
          try{
            recFull.source='استيراد إكسل (تحديث)';
            var createdM=await dbInsertRecord(modId, recFull);
            store.unshift(createdM);
            addedM++;
          }catch(errC){ failedM++; }
        }
      }
      render();
      var msgM='تم تحديث '+updated+' سجل مطابق، وإضافة '+addedM+' سجل جديد';
      if(schoolsCreatedM) msgM+='، وإنشاء '+schoolsCreatedM+' مدرسة تلقائياً';
      if(skippedM) msgM+=' — تم تجاهل '+skippedM+' صف';
      if(failedM) msgM+=' — تعذر حفظ '+failedM+' صف';
      toast(msgM);
      return;
    }

    var replaceMode = importMode==='replace';
    var deletedCount=0;
    if(replaceMode){
      toast('جارٍ حذف السجلات الحالية دفعة واحدة...');
      var currentIds = modId==='schools'
        ? APP.db.schools.map(function(r){return r.id;})
        : APP.db.records.filter(function(r){return r.category===modId;}).map(function(r){return r.id;});
      try{
        await dbBulkDelete(modId, currentIds);
        deletedCount=currentIds.length;
        if(modId==='schools') APP.db.schools=[];
        else APP.db.records=APP.db.records.filter(function(r){return r.category!==modId;});
      }catch(errD){
        toast('تعذر حذف بعض السجلات الحالية: '+(errD&&errD.message?errD.message:''), true);
      }
    }

    toast('جارٍ تجهيز '+rows.length+' صف...');
    var validRecs=[], skipped=0, schoolsCreated=0;
    for(var i=0;i<rows.length;i++){
      var rec=mapRowToRecord(mod, rows[i]);
      var beforeCount=APP.db.schools.length;
      rec=await fillMissingSchoolLinks(mod, rec, rows[i]);
      if(APP.db.schools.length>beforeCount) schoolsCreated++;
      var reqOk = mod.fields.filter(function(f){return f.required;}).every(function(f){return rec[f.key];});
      if(!reqOk){ skipped++; continue; }
      rec.source='استيراد إكسل';
      validRecs.push(rec);
    }

    if(!validRecs.length && skipped===rows.length){
      var expectedLabels=mod.fields.filter(function(f){return f.required;}).map(function(f){return f.label;});
      var foundHeaders=Object.keys(rows[0]||{});
      toast('لم يتم استيراد أي صف: أعمدة الملف لا تطابق أعمدة القالب. الحقول المطلوبة: '+expectedLabels.join('، ')+' — أعمدة ملفك: '+foundHeaders.join('، '), true);
      render();
      return;
    }

    var added=0, failed=0;
    if(validRecs.length){
      toast('جارٍ حفظ '+validRecs.length+' سجل دفعة واحدة...');
      try{
        var created=await dbBulkInsertRecords(modId, validRecs);
        var store2=getStore(modId);
        for(var c=created.length-1;c>=0;c--) store2.unshift(created[c]);
        added=created.length;
        failed=validRecs.length-created.length;
      }catch(errI){
        failed=validRecs.length;
        toast('تعذر حفظ السجلات: '+(errI&&errI.message?errI.message:''), true);
      }
    }
    render();
    var msg = replaceMode ? ('تم حذف '+deletedCount+' سجل سابق، و') : 'تم ';
    msg+='استيراد '+added+' سجل جديد';
    if(schoolsCreated) msg+='، وإنشاء '+schoolsCreated+' مدرسة تلقائياً';
    if(skipped) msg+=' — تم تجاهل '+skipped+' صف لعدم اكتمال الحقول المطلوبة';
    if(failed) msg+=' — تعذر حفظ '+failed+' صف';
    toast(msg);
   }catch(fatalErr){
     toast('حدث خطأ غير متوقع أثناء الاستيراد: '+(fatalErr&&fatalErr.message?fatalErr.message:String(fatalErr)), true);
     render();
   }
  };
  reader.readAsArrayBuffer(file);
}

/* ---- استيراد ملف الأداء المدرسي بصيغته الوزارية الأصلية (بدون أي تعديل) ----
   يتعرف على كل مدرسة عبر الرقم الإحصائي: يحدّث السجل إن كان موجوداً، ويضيفه إن كان جديداً،
   وينشئ المدرسة تلقائياً في قاعدة بيانات المدارس إن لم تكن مسجّلة مسبقاً. */
async function importOfficialPerformanceFile(file){
  var modId='school_performance';
  var reader=new FileReader();
  reader.onload=async function(e){
    var rows;
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array'});
      var sheetName = wb.SheetNames.find(function(n){ return n.indexOf('مدرسة')>=0; }) || wb.SheetNames[0];
      var ws=wb.Sheets[sheetName];
      rows=XLSX.utils.sheet_to_json(ws,{header:1, defval:''});
    }catch(err){
      toast('تعذرت قراءة الملف، تأكد أنه بصيغة إكسل صحيحة', true); return;
    }

    var headerRowIdx=-1;
    for(var i=0;i<rows.length;i++){
      var c1=String(rows[i][1]||'');
      if(c1.indexOf('اسم المدرسة')>=0){ headerRowIdx=i; break; }
    }
    if(headerRowIdx===-1){
      toast('تعذر التعرف على تنسيق الملف. تأكد أنه الملف الرسمي دون تعديل على صفوف العناوين.', true); return;
    }

    var dataRows = rows.slice(headerRowIdx+1);
    toast('جارٍ معالجة الملف...');

    var added=0, updated=0, failed=0, schoolsCreated=0;
    for(var r=0;r<dataRows.length;r++){
      var row=dataRows[r];
      var name=String(row[1]||'').trim();
      if(!name) break; // نهاية بيانات المدارس الفعلية — ما بعدها جداول إحصائية ملخّصة في نفس الورقة
      var statNumber=String(row[2]||'').trim();
      var stage=String(row[3]||'').trim();
      var gender=String(row[4]||'').trim();

      var school=APP.db.schools.find(function(s){ return s.name && s.name.trim()===name; });
      if(!school){
        try{
          var created=await dbInsertRecord('schools', {
            name:name, gender:gender, stage:stage, studentsCount:'', teachersCount:'',
            principal:String(row[24]||''), supervisor:'', location:'', notes:'أُنشئت تلقائياً من ملف الأداء الرسمي'
          });
          APP.db.schools.unshift(created);
          school=created; schoolsCreated++;
        }catch(errS){ failed++; continue; }
      }

      var recData={
        schoolId: school.id,
        statNumber: statNumber,
        stage: stage,
        gender: gender,
        buildingType: String(row[5]||''),
        buildingIndependence: String(row[6]||''),
        adminIndependence: String(row[7]||''),
        period: String(row[8]||''),
        withinDelegationDistance: String(row[9]||''),
        historicalPerformance: String(row[10]||''),
        historicalPerformancePct: row[11]!==undefined? row[11]:'',
        lastReviewType: String(row[12]||''),
        currentPerformance: String(row[13]||''),
        currentPerformancePct: row[14]!==undefined? row[14]:'',
        learningOutcomesLevel: String(row[15]||''),
        learningOutcomesPct: row[16]!==undefined? row[16]:'',
        receivesSupport: String(row[17]||''),
        supporter1Name: String(row[18]||''),
        supporter1Id: String(row[19]||''),
        supportAreas1: String(row[20]||''),
        supporter2Name: String(row[21]||''),
        supporter2Id: String(row[22]||''),
        supportAreas2: String(row[23]||''),
        principalName: String(row[24]||''),
        principalId: String(row[25]||''),
        principalPhone: String(row[26]||''),
        date: todayISO()
      };

      var existing = statNumber ? APP.db.records.find(function(x){ return x.category===modId && String(x.statNumber||'')===statNumber; }) : null;
      try{
        if(existing){
          var upd=await dbUpdateRecord(modId, existing.id, recData);
          Object.assign(existing, upd);
          updated++;
        }else{
          recData.source='الملف الرسمي';
          var ins=await dbInsertRecord(modId, recData);
          getStore(modId).unshift(ins);
          added++;
        }
      }catch(errR){ failed++; }
    }
    render();
    var msg='تم الاستيراد: '+added+' سجل جديد، '+updated+' تحديث لسجلات موجودة';
    if(schoolsCreated) msg+='، '+schoolsCreated+' مدرسة أُضيفت تلقائياً';
    if(failed) msg+='، تعذر حفظ '+failed+' صف';
    toast(msg);
  };
  reader.readAsArrayBuffer(file);
}

/* ================= المؤشرات التنفيذية (KPIs) ================= */
var KPI_EXCELLENCE_KEY='excellent_schools_ratio';
var KPI_DEFAULTS={ interim_pct:20, interim_date:'', strategic_pct:38, strategic_date:'2027' };

function computeExcellenceKpi(){
  var perf=APP.db.records.filter(function(r){return r.category==='school_performance' && !r.archived;});
  var total=perf.length;
  var excellent=perf.filter(function(r){return r.currentPerformance==='التميز';}).length;
  var pct = total? (excellent/total*100) : 0;
  var byGender={'بنين':{total:0,excellent:0},'بنات':{total:0,excellent:0}};
  var byStage={'ابتدائي':{total:0,excellent:0},'متوسط':{total:0,excellent:0},'ثانوي':{total:0,excellent:0}};
  perf.forEach(function(r){
    if(byGender.hasOwnProperty(r.gender)){ byGender[r.gender].total++; if(r.currentPerformance==='التميز') byGender[r.gender].excellent++; }
    if(byStage.hasOwnProperty(r.stage)){ byStage[r.stage].total++; if(r.currentPerformance==='التميز') byStage[r.stage].excellent++; }
  });
  return {total:total, excellent:excellent, pct:pct, byGender:byGender, byStage:byStage};
}

/* مدارس واعدة بالتميز: نسبة الأداء العام الحالي أو نسبة نواتج التعلم بين 85 و89 (وليست مصنّفة تميز أصلاً) */
function computePromisingSchools(){
  var perf=APP.db.records.filter(function(r){return r.category==='school_performance' && !r.archived;});
  var inRange=function(v){ var n=parseFloat(v); return !isNaN(n) && n>=85 && n<=89; };
  return perf.filter(function(r){
    if(r.currentPerformance==='التميز') return false;
    return inRange(r.currentPerformancePct) || inRange(r.learningOutcomesPct);
  }).map(function(r){
    var s=APP.db.schools.find(function(x){return x.id===r.schoolId;});
    return {
      schoolName: s?s.name:'—',
      stage:r.stage, gender:r.gender,
      currentPerformancePct:r.currentPerformancePct,
      learningOutcomesPct:r.learningOutcomesPct,
      currentPerformance:r.currentPerformance
    };
  }).sort(function(a,b){
    var av=Math.max(parseFloat(a.currentPerformancePct)||0, parseFloat(a.learningOutcomesPct)||0);
    var bv=Math.max(parseFloat(b.currentPerformancePct)||0, parseFloat(b.learningOutcomesPct)||0);
    return bv-av;
  });
}

async function loadKpiSettings(){
  try{
    var res=await sb.from('kpi_settings').select('*').eq('key', KPI_EXCELLENCE_KEY).maybeSingle();
    if(res.error) throw res.error;
    APP.kpiSettings = (res.data && res.data.value) ? res.data.value : Object.assign({}, KPI_DEFAULTS);
  }catch(e){
    APP.kpiSettings = Object.assign({}, KPI_DEFAULTS);

/* ================= تحليل الأداء ورصد الفجوات ================= */
function computeGapAnalysis(){
  var db=APP.db;
  var perf=db.records.filter(function(r){return r.category==='school_performance' && !r.archived;});
  var PERF_ORDER=['التميز','التقدم','الانطلاق','التهيئة'];

  /* 1) التوزيع الكامل حسب الفئة والنوع */
  var byCategoryGender={};
  PERF_ORDER.forEach(function(c){ byCategoryGender[c]={'بنين':0,'بنات':0}; });
  var noReport={'بنين':0,'بنات':0};
  perf.forEach(function(r){
    var cat = PERF_ORDER.indexOf(r.currentPerformance)>=0 ? r.currentPerformance : null;
    var g = (r.gender==='بنين'||r.gender==='بنات') ? r.gender : null;
    if(!g) return;
    if(cat) byCategoryGender[cat][g]++;
    else noReport[g]++;
  });

  /* 2) أكبر الفجوات بين الأداء العام ونواتج التعلم لكل مدرسة */
  var gapList=perf.map(function(r){
    var s=db.schools.find(function(x){return x.id===r.schoolId;});
    var gen=parseFloat(r.currentPerformancePct), lo=parseFloat(r.learningOutcomesPct);
    if(isNaN(gen)||isNaN(lo)) return null;
    return {name:s?s.name:'—', gender:r.gender, stage:r.stage, gen:gen, lo:lo, gap:gen-lo};
  }).filter(Boolean).sort(function(a,b){ return Math.abs(b.gap)-Math.abs(a.gap); }).slice(0,10);

  /* 3) مدارس مهدَّدة بالتراجع (قريبة من الحد الأدنى لفئتها) */
  var atRisk=[];
  perf.forEach(function(r){
    var pct=parseFloat(r.currentPerformancePct);
    if(isNaN(pct)) return;
    var threshold=null;
    if(r.currentPerformance==='التميز' && pct<93) threshold='التميز (قريبة من حد 90%)';
    else if(r.currentPerformance==='التقدم' && pct<=82) threshold='التقدم (قريبة من الانطلاق)';
    else if(r.currentPerformance==='الانطلاق' && pct<=72) threshold='الانطلاق (قريبة من التهيئة)';
    if(threshold){
      var s=db.schools.find(function(x){return x.id===r.schoolId;});
      atRisk.push({name:s?s.name:'—', gender:r.gender, pct:pct, zone:threshold});
    }
  });
  atRisk.sort(function(a,b){return a.pct-b.pct;});

  /* 4) ربط الشواغر الإدارية بالأداء */
  var vacancyByLevel={};
  PERF_ORDER.concat(['لا يوجد']).forEach(function(c){ vacancyByLevel[c]={total:0, vacantDeputy:0, vacantCounselor:0}; });
  perf.forEach(function(r){
    var s=db.schools.find(function(x){return x.id===r.schoolId;});
    if(!s) return;
    var cat = PERF_ORDER.indexOf(r.currentPerformance)>=0 ? r.currentPerformance : 'لا يوجد';
    vacancyByLevel[cat].total++;
    var dep=parseFloat(s.deputyCount), cou=parseFloat(s.counselorCount);
    if(!dep || dep===0) vacancyByLevel[cat].vacantDeputy++;
    if(!cou || cou===0) vacancyByLevel[cat].vacantCounselor++;
  });

  return {byCategoryGender:byCategoryGender, noReport:noReport, gapList:gapList, atRisk:atRisk, vacancyByLevel:vacancyByLevel, PERF_ORDER:PERF_ORDER, total:perf.length};
}

  if(!a.total){
    return '<div class="panel">لا توجد بيانات كافية في "الأداء المدرسي" لإجراء التحليل بعد.</div>';
  }

  var colorsMap={'التميز':'#1D7A3C','التقدم':'#1C5FA8','الانطلاق':'#9A5A0A','التهيئة':'#B32E24'};

  /* التوزيع حسب الفئة والنوع */
  html+='<div class="panel">';
  html+='<h3><span class="sq"></span>التوزيع الكامل حسب فئة الأداء والنوع</h3>';
  var maxCount=1;

async function syncLinkNow(link, btn){
  var mod=getModule(link.category);
  if(!mod){ toast('فئة غير معروفة لهذا الرابط', true); return; }
  if(btn){ btn.disabled=true; btn.textContent='جارٍ المزامنة...'; }
  try{
    var res=await fetch(link.url);
    if(!res.ok) throw new Error('تعذر الاتصال بالرابط (رمز '+res.status+')');
    var csvText=await res.text();
    var wb=XLSX.read(csvText, {type:'string'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws, {defval:''});

    var existing = mod.id==='schools' ? APP.db.schools : APP.db.records.filter(function(r){return r.category===mod.id;});
    var existingSigs={};
    existing.forEach(function(r){ existingSigs[recordSignature(mod, r)]=true; });

    var validRecs=[], skipped=0, duplicate=0;
    for(var i=0;i<rows.length;i++){
      var rec=mapRowToRecord(mod, rows[i]);
      rec=await fillMissingSchoolLinks(mod, rec, rows[i]);
      var reqOk = mod.fields.filter(function(f){return f.required;}).every(function(f){return rec[f.key];});
      if(!reqOk){ skipped++; continue; }
      var sig=recordSignature(mod, rec);
      if(existingSigs[sig]){ duplicate++; continue; }
      rec.source='مزامنة تلقائية';
      existingSigs[sig]=true;
      validRecs.push(rec);
    }
    var added=0, failed=0;
    if(validRecs.length){
      try{
        var created=await dbBulkInsertRecords(mod.id, validRecs);
        var store=getStore(mod.id);
        for(var c=created.length-1;c>=0;c--) store.unshift(created[c]);
        added=created.length;
        failed=validRecs.length-created.length;
      }catch(errI){ failed=validRecs.length; }
    }
    try{
      await sb.from('form_links').update({last_synced_at:new Date().toISOString()}).eq('id', link.id);
      link.lastSyncedAt=new Date().toISOString();
    }catch(e3){}
    render();
    var msg='تمت المزامنة: '+added+' سجل جديد';
    if(duplicate) msg+='، '+duplicate+' سجل مكرر تم تجاهله';
    if(skipped) msg+='، '+skipped+' صف غير مكتمل تم تجاهله';
    if(failed) msg+='، تعذر حفظ '+failed+' صف';
    toast(msg);
  }catch(err){
    toast('تعذرت المزامنة: '+(err&&err.message?err.message:'تأكد أن الرابط CSV عام ومنشور بشكل صحيح'), true);
    render();
  }
}
